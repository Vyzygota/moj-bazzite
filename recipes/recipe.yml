name: moj-bazzite
description: Bazzite z najnowszym kernelem z repozytorium vanilla-mainline
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/g/kernel-vanilla/mainline/repo/fedora-%OS_VERSION%/group_kernel-vanilla-mainline-fedora-%OS_VERSION%.repo
    replace:
      - from-repo: https://copr.fedorainfracloud.org/coprs/g/kernel-vanilla/mainline/repo/fedora-%OS_VERSION%/group_kernel-vanilla-mainline-fedora-%OS_VERSION%.repo
        packages:
          - kernel
          - kernel-core
          - kernel-modules
          - kernel-modules-core
          - kernel-modules-extra
          - kernel-devel

  - type: akmods
    install:
      - nvidia
