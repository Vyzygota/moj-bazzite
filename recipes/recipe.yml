name: moj-bazzite
description: Mój Bazzite Deck - ciągle aktualny system ze zbudowaną Nvidią i agentem AI
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
# Bazzite Deck pobierany w wersji absolutnie najświeższej z dnia budowania
image-version: latest

modules:
  - type: copy
    from: ghcr.io/vyzygota/akmods-nvidia-custom:latest
    src: /rpms
    dest: /tmp/custom-rpms

  - type: script
    snippets:
      - |
        echo "=========================================================="
        echo "1. Wstrzykiwanie Rdzenia: Najnowszy Linux Kernel + NVIDIA"
        echo "=========================================================="
        # Pobieramy wersje biezacego kernela zainstalowanego w obrazie Bazzite Deck
        CURRENT_KERNEL=$(rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" kernel | head -n 1)
        
        echo "Wstrzykiwanie wlasnych modulow (*.ko) do kernela: $CURRENT_KERNEL"
        mkdir -p /usr/lib/modules/$CURRENT_KERNEL/extra/custom
        cp /tmp/custom-rpms/kmods/*.ko /usr/lib/modules/$CURRENT_KERNEL/extra/custom/
        depmod -a $CURRENT_KERNEL
