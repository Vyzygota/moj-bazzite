name: moj-bazzite
description: Personalizowany Bazzite - Brave, Kleopatra, najnowszy Kernel i ProtonGE
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  # 1. Zarządzanie pakietami systemowymi RPM
  - type: rpm-ostree
    repos:
      - copr:mrduarte/LenovoLegionLinux
    install:
      - kleopatra
      # - python-LenovoLegionLinux # To jest aplikacja GUI od Lenovo

  # 2. Zarządzanie pakietami Flatpak
  - type: default-flatpaks
    configurations:
      - scope: user
        install:
          - com.brave.Browser       
          - net.davidotek.pupgui2   

  # 3. Kopiowanie sterowników NVIDIA (.rpm) i Lenovo (.ko)
  - type: copy
    from: ghcr.io/vyzygota/akmods-nvidia-7.0:latest
    src: /rpms
    dest: /tmp/custom-rpms

  # 4. Skrypt podmieniający Kernel
  - type: script
    snippets:
      - |
        echo "Przygotowuję repozytorium Rawhide..."
        cat << EOF > /etc/yum.repos.d/fedora-rawhide.repo
        [rawhide]
        name=Fedora - Rawhide
        baseurl=http://download.fedoraproject.org/pub/fedora/linux/development/rawhide/Everything/x86_64/os/
        enabled=1
        gpgcheck=0
        EOF

        echo "Pobieram najnowszy kernel..."
        mkdir -p /tmp/latest-kernel
        cd /tmp/latest-kernel
        dnf5 download kernel kernel-core kernel-modules kernel-modules-core kernel-modules-extra kernel-devel --disablerepo="*" --enablerepo="rawhide"

        echo "Finalna podmiana Kernela i Nvidii..."
        rpm-ostree override replace \
          --remove=kernel-devel-matched \
          --remove=kernel-modules-akmods \
          --remove=usbip \
          --remove=kernel-nvidia \
          /tmp/latest-kernel/*.rpm \
          /tmp/custom-rpms/*.rpm
          
        echo "Wpinanie surowych modułów Lenovo..."
        NEW_KERNEL=$(rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" -p /tmp/latest-kernel/kernel-core-*.rpm | head -n 1)
        mkdir -p /usr/lib/modules/$NEW_KERNEL/extra/lenovo
        # POPRAWIONA ŚCIEŻKA (zgodna z Containerfile Twojego repo sterowników)
        cp /tmp/custom-rpms/kmods/*.ko /usr/lib/modules/$NEW_KERNEL/extra/lenovo/
        depmod -a $NEW_KERNEL

        echo "Instalacja GUI Lenovo..."
        # POPRAWIONA SKŁADNIA DNF5 DLA COPR
        dnf5 copr enable -y mrduarte/LenovoLegionLinux
        dnf5 install -y python-LenovoLegionLinux
