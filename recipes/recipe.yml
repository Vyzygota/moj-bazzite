name: moj-bazzite
description: Bazzite z podmienionym kernelem - Poprawna transakcja
base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

modules:
  - type: script
    snippets:
      - |
        # Wykonujemy jedną, atomową transakcję:
        # 1. Usuwamy pakiety konfliktujące (--remove)
        # 2. Zastępujemy bazowe jądro nowymi plikami z URL
        rpm-ostree override replace \
          --remove=kernel-devel-matched \
          --remove=kernel-modules-akmods \
          --remove=usbip \
          https://mirrors.fedora.is/fedora/linux/releases/44/Everything/x86_64/os/Packages/k/kernel-6.19.6-200.fc44.x86_64.rpm \
          https://mirrors.fedora.is/fedora/linux/releases/44/Everything/x86_64/os/Packages/k/kernel-core-6.19.6-200.fc44.x86_64.rpm \
          https://mirrors.fedora.is/fedora/linux/releases/44/Everything/x86_64/os/Packages/k/kernel-modules-6.19.6-200.fc44.x86_64.rpm \
          https://mirrors.fedora.is/fedora/linux/releases/44/Everything/x86_64/os/Packages/k/kernel-modules-core-6.19.6-200.fc44.x86_64.rpm \
          https://mirrors.fedora.is/fedora/linux/releases/44/Everything/x86_64/os/Packages/k/kernel-modules-extra-6.19.6-200.fc44.x86_64.rpm \
          https://mirrors.fedora.is/fedora/linux/releases/44/Everything/x86_64/os/Packages/k/kernel-devel-6.19.6-200.fc44.x86_64.rpm

  - type: akmods
    install:
      - nvidia
