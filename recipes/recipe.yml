name: moj-bazzite
description: Bazzite z kernelem 7.0 (nadpisanie bazy systemowej)
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      - https://fr2.rpmfind.net/linux/fedora/linux/development/rawhide/Everything/x86_64/os/
    replace:
      - from-repo: https://fr2.rpmfind.net/linux/fedora/linux/development/rawhide/Everything/x86_64/os/
        packages:
          - kernel
          - kernel-core
          - kernel-modules
          - kernel-modules-core
          - kernel-modules-extra
          - kernel-devel

  - type: akmods
    install:
      - nvidia
