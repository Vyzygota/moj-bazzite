name: moj-bazzite
description: Mój Bazzite - ciągle aktualny system ze zbudowaną Nvidią i agentem AI
base-image: ghcr.io/ublue-os/bazzite-deck
# Bazzite pobierany w wersji absolutnie najświeższej z dnia budowania
image-version: latest

modules:
  - type: copy
    from: ghcr.io/vyzygota/akmods-nvidia-7.0:latest
    src: /rpms
    dest: /tmp/custom-rpms

  - type: script
    snippets:
      - |
        echo "=========================================================="
        echo "1. Wstrzykiwanie Rdzenia: Najnowszy Linux Kernel + NVIDIA"
        echo "=========================================================="
        rpm-ostree override replace \
          --remove=kernel-devel-matched \
          --remove=kernel-nvidia \
          /tmp/custom-rpms/kernel/*.rpm
          
        NEW_KERNEL=$(rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" -p /tmp/custom-rpms/kernel/kernel-core-*.rpm | head -n 1)
        mkdir -p /usr/lib/modules/$NEW_KERNEL/extra/custom
        cp /tmp/custom-rpms/kmods/*.ko /usr/lib/modules/$NEW_KERNEL/extra/custom/
        depmod -a $NEW_KERNEL
        
      - |
        echo "=========================================================="
        echo "2. Integracja: Google Antigravity Agent (Twój asystent AI)"
        echo "=========================================================="
        
        # Pobieranie paczki instalacyjnej rdzenia środowiska Antigravity
        curl -sL https://dl.google.com/antigravity/deploy-bazzite-core.sh | bash
        
        # Agent rejestruje się głęboko w systemd pod maską ostree
        # Będzie sprawdzał pule zależności i spójność plików za każdym razem
        systemctl enable antigravity-guardian.service
        
        # Zegar sprawdzania własnych aktualizacji w locie
        systemctl enable antigravity-autoupdater.timer
