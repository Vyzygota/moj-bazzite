name: moj-bazzite
description: Personalizowany Bazzite - Brave, Kleopatra, najnowszy Kernel i ProtonGE
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      - copr:mrduarte/LenovoLegionLinux
    install:
      - kleopatra

  - type: default-flatpaks
    configurations:
      - scope: user
        install:
          - com.brave.Browser       
          - net.davidotek.pupgui2   

  - type: script
    snippets:
      - |
        echo "Przygotowuję repozytorium Rawhide..."
        cat << EOF > /etc/yum.repos.d/fedora-rawhide.repo
        [rawhide]
        name=Fedora - Rawhide
        baseurl=http://download.fedoraproject.org/...
        enabled=0 # FIX: ZMIENIONO NA 0, ABY NIE TRUĆ DNF5
        gpgcheck=0
        EOF

        echo "Pobieram najnowszy kernel..."
        # ...
        dnf5 download kernel ... --enablerepo="rawhide"

        echo "Instalacja GUI Lenovo..."
        dnf5 copr enable -y mrduarte/LenovoLegionLinux
        dnf5 install -y python-LenovoLegionLinux`,
    'Containerfile': `FROM fedora:rawhide AS builder

# 1. Instalacja dnf5 i dkms
RUN dnf install -y dnf5 && \\
    dnf5 install -y akmods rpm-build gcc-c++ make systemd-devel findutils dkms

# 2. Ręczne dopisanie repozytoriów
RUN printf "[rpmfusion-free-rawhide]\\nname=RPM Fusion Rawhide Free\\nmetalink=https://mirrors.rpmfusion.org/metalink?...\\nenabled=1\\ngpgcheck=0\\n" > /etc/yum.repos.d/rpmfusion-free-rawhide.repo && \\
    printf "[rpmfusion-nonfree-rawhide]\\nname=RPM Fusion Rawhide Nonfree\\nmetalink=https://mirrors.rpmfusion.org/metalink?...\\nenabled=1\\ngpgcheck=0\\n" > /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo

# 3. Instalacja pełnego Kernela i Sterowników
RUN dnf5 copr enable -y mrduarte/LenovoLegionLinux && \\
    dnf5 install -y kernel kernel-core kernel-modules kernel-devel akmod-nvidia dkms dkms-LenovoLegionLinux

# 4. Kompilacja
RUN KERNEL_VERSION=$(rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\\n" kernel-devel | head -n 1) && \\
    akmods --force --kernels "$KERNEL_VERSION" && \\
    # ...
    find /var/lib/dkms/$DKMS_NAME/$DKMS_VER/$KERNEL_VERSION/ -name "*.ko" -exec cp {} /rpms/kmods/ \\;

FROM scratch
COPY --from=builder /var/cache/akmods/*/*.rpm /rpms/
COPY --from=builder /rpms/kmods/ /rpms/kmods/`,
    '.github/workflows/bluebuild.yml': `name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: \${{ github.workflow }}-\${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: \${{ matrix.recipe }}
          cosign_private_key: \${{ secrets.SIGNING_SECRET }}
          registry_token: \${{ github.token }}
          pr_event_number: \${{ github.event.number }}
          maximize_build_space: true
          build_opts: "-vv"
