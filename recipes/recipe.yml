name: moj-bazzite
description: Bazzite z najnowszym kernelem z repozytorium vanilla-mainline
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/group_kernel/vanilla-mainline/repo/fedora-40/group_kernel-vanilla-mainline-fedora-40.repo
    install:
      - kernel
      - kernel-devel

  - type: akmods
    install:
      - nvidia
