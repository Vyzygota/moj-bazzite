modules:
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/g/kernel-vanilla/mainline/repo/fedora-rawhide/group_kernel-vanilla-mainline-fedora-rawhide.repo
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:group_kernel-vanilla:mainline
        packages:
          - kernel
          - kernel-core
          - kernel-modules
          - kernel-modules-core
          - kernel-modules-extra
          - kernel-devel

  - type: akmods
    install:
      - nvidia
