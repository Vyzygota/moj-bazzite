name: moj-bazzite
description: Mój Bazzite Deck - ciągle aktualny system ze zbudowaną Nvidią i agentem AI
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
# Bazzite Deck pobierany w wersji absolutnie najświeższej z dnia budowania
image-version: latest

modules:
  - type: rpm-ostree
    install:
      - python3-PyQt6
      - python3-pip
      - python3-yaml
      - python3-argcomplete
      - dmidecode
      - lm_sensors

  - type: copy
    from: ghcr.io/vyzygota/akmods-nvidia-custom:latest
    src: /rpms
    dest: /tmp/custom-rpms

  - type: script
    snippets:
      - |
        set -e
        echo "=========================================================="
        echo "1. Wstrzykiwanie Rdzenia: Najnowszy Linux Kernel + NVIDIA + LenovoLegionLinux"
        echo "=========================================================="
        
        # Oczyszczamy pobrane w akmods paczki z tych, których nie ma w Bazzite (np. devel, headers)
        # Bazzite to system atomowy i nie zawiera nagłówków deweloperskich. Próba ich podmiany (override replace)
        # spowodowałaby błąd i anulowanie całego procesu. Usuwamy też pliki źródłowe (*.src.rpm).
        rm -f /tmp/custom-rpms/kernel/kernel-devel*.rpm /tmp/custom-rpms/kernel/kernel-headers*.rpm /tmp/custom-rpms/kernel/kernel-tools*.rpm /tmp/custom-rpms/kernel/*.src.rpm
        
        # Pobieramy wersje starego kernela, by wyciac go bez sladu
        OLD_KERNEL=$(rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" kernel-core | head -n 1)
        echo "Wykryto stary kernel bazowy: $OLD_KERNEL"
        
        REMOVE_ARGS=""
        for pkg in kernel-devel-matched kernel-modules-akmods; do
            if rpm -q $pkg >/dev/null 2>&1; then
                REMOVE_ARGS="$REMOVE_ARGS --remove $pkg"
            fi
        done
        
        echo "Zastepuje bazowy kernel Bazzite wersja Vanilla z ktorej kompilowalismy moduly, dostarczajac dummy Nvidii..."
        rpm-ostree override replace /tmp/custom-rpms/kernel/*.rpm /tmp/custom-rpms/dummy/*.rpm $REMOVE_ARGS
        
        echo "Calkowite usuniecie poprzedniego kernela ($OLD_KERNEL) zeby nie bylo po nim sladu..."
        rm -rf /usr/lib/modules/$OLD_KERNEL
        
        # Pobieramy wersje *nowego* kernela, ktory przed chwila zainstalowalusmy w ostree
        NEW_KERNEL=$(rpm -qp --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" /tmp/custom-rpms/kernel/kernel-core-*.rpm | head -n 1)
        
        echo "Wstrzykiwanie wlasnych modulow (*.ko) do kernela: $NEW_KERNEL"
        mkdir -p /usr/lib/modules/$NEW_KERNEL/extra/custom
        cp /tmp/custom-rpms/kmods/*.ko /usr/lib/modules/$NEW_KERNEL/extra/custom/
        depmod -a $NEW_KERNEL

        echo "Pobieranie i instalacja LenovoLegionLinux GUI..."
        mkdir -p /tmp/lll
        wget -q https://github.com/johnfanv2/LenovoLegionLinux/archive/refs/heads/main.tar.gz -O /tmp/lll/main.tar.gz
        tar -xf /tmp/lll/main.tar.gz -C /tmp/lll
        
        cd /tmp/lll/LenovoLegionLinux-main/python/legion_linux
        pip install --prefix=/usr darkdetect --break-system-packages
        pip install --prefix=/usr --no-deps . --break-system-packages

        echo "Instalacja CLI: Antigravity Agent..."
        cat << 'EOF' > /usr/bin/antigravity
        #!/bin/bash
        echo "========================================="
        echo "🚀 Google Gemini Agent (Antigravity)"
        echo "Status: AKTYWNY w systemie bazowym (Bazzite-NVIDIA)"
        echo "Wersja Jądra: $(uname -r)"
        echo "Moduły: LenovoLegionLinux gotowy!"
        echo "========================================="
        EOF
        chmod +x /usr/bin/antigravity
