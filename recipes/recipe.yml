name: moj-bazzite
description: Personalizowany Bazzite - Brave, Kleopatra, najnowszy Kernel i ProtonGE
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  # 1. Zarządzanie pakietami systemowymi RPM
  - type: rpm-ostree
    repos:
      - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
    install:
      - brave-browser
      - proton-ge-custom
      - kleopatra

  # 2. Zarządzanie pakietami Flatpak (usuwanie domyślnego Firefoxa)
  - type: default-flatpaks
    system:
      remove:
        - org.mozilla.firefox
        - org.mozilla.firefox.Locale

  # 3. Kopiowanie skompilowanych sterowników NVIDIA
  - type: copy
    from: ghcr.io/vyzygota/akmods-nvidia-7.0:latest
    src: /rpms
    dest: /tmp/nvidia-rpms

  # 4. Skrypt podmieniający Kernel na najnowszy z Rawhide
  - type: script
    snippets:
      - |
        echo "Przygotowuję repozytorium Rawhide..."
        cat << EOF > /etc/yum.repos.d/fedora-rawhide.repo
        [rawhide]
        name=Fedora - Rawhide
        baseurl=http://download.fedoraproject.org/pub/fedora/linux/development/rawhide/Everything/x86_64/os/
        enabled=1
        gpgcheck=0
        EOF
        
        echo "Pobieram najnowszy kernel..."
        mkdir -p /tmp/latest-kernel
        cd /tmp/latest-kernel
        dnf5 download kernel kernel-core kernel-modules kernel-modules-core kernel-modules-extra kernel-devel --disablerepo="*" --enablerepo="rawhide"
        
        echo "Finalna podmiana Kernela i Nvidii..."
        rpm-ostree override replace \
          --remove=kernel-devel-matched \
          --remove=kernel-modules-akmods \
          --remove=usbip \
          --remove=kernel-nvidia \
          /tmp/latest-kernel/*.rpm \
          /tmp/nvidia-rpms/*.rpm
