name: moj-bazzite
description: Bazzite z najnowszym kernelem z repozytorium vanilla-mainline
base-image: ghcr.io/ublue-os/bazzite-deck-nvidia
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/g/kernel-vanilla/mainline/repo/fedora-40/group_kernel-vanilla-mainline-fedora-40.repo
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:group_kernel-vanilla:mainline
        packages:
          - kernel
          - kernel-core
          - kernel-modules
          - kernel-modules-core
          - kernel-modules-extra
          - kernel-devel

  - type: akmods
    install:
      - nvidia
