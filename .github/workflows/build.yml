name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *" # Buduje codziennie o 6:00 UTC
  push:
    paths-ignore:
      - "**.md" # Ignoruje zmiany w plikach dokumentacji
  pull_request:
  workflow_dispatch: # Pozwala na ręczne uruchomienie z zakładki Actions

concurrency:
  # Zapewnia, że w danym momencie działa tylko jedno zadanie budowania
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          build_opts: "-vv"

  build-iso:
    name: Build and Upload ISO to Google Drive
    runs-on: ubuntu-latest
    needs: bluebuild # Czeka, aż obraz kontenera zostanie zbudowany i wysłany
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1. Generujemy dzisiejszą datę do nazwy pliku
      - name: Get current date
        id: date
        run: echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      # 2. Budujemy czyste ISO
      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.2
        with:
          arch: x86_64
          image_name: moj-bazzite
          image_repo: ghcr.io/vyzygota
          image_tag: latest
          version: 43
          variant: Kinoite
          # Nazwa wyjściowego pliku ISO, np. moj-bazzite-20260419.iso
          iso_name: moj-bazzite-${{ steps.date.outputs.today }}.iso

      # 3. Wysyłamy ISO bezpośrednio na Google Drive
      - name: Upload ISO to Google Drive
        uses: work-solutions/google-drive-upload@v1
        with:
          # Dane z klucza JSON, który wygenerowałeś
          credentials: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          # ID folderu na Twoim dysku Google
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          # Plik, który został wygenerowany krok wcześniej
          filename: moj-bazzite-${{ steps.date.outputs.today }}.iso
          # false = jeśli plik o tej nazwie istnieje, doda (1) do nazwy zamiast nadpisywać
          overwrite: "false"
